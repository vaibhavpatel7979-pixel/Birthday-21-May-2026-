<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vidhii ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins,sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:'';
position:fixed;
inset:0;
background:radial-gradient(circle at top,#3b0764,#000);
z-index:-3;
}

/* STAR */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
opacity:.6;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

/* ENTRY */
#entry{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#2a0040,#000);
z-index:9999;
text-align:center;
}

#entry h1{
font-size:44px;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:25px;
padding:16px 45px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#ff1493,#9333ea);
color:white;
cursor:pointer;
font-size:18px;
}

/* SECTIONS */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:80px 20px;
}

h1{
font-size:60px;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:20px;
color:#ddd;
max-width:900px;
}

/* CAKE */
.cake{
font-size:180px;
animation:pulse 2s infinite;
text-shadow:0 0 40px rgba(255,20,147,.6);
}

@keyframes pulse{
50%{transform:scale(1.1);}
}

/* BUTTON */
.cake-btn{
margin-top:25px;
padding:16px 45px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,#ff1493,#9333ea);
color:white;
cursor:pointer;
font-size:18px;
}

/* CONFETTI */
.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
z-index:9999;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}
}

/* FIREWORK */
.firework{
position:fixed;
font-size:18px;
animation:boom 1.5s ease-out forwards;
z-index:9999;
}

@keyframes boom{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(3);opacity:0;}
}

/* SHAKE */
.shake{
animation:shake .5s;
}

@keyframes shake{
0%,100%{transform:translate(0);}
20%{transform:translate(-5px,5px);}
40%{transform:translate(5px,-5px);}
60%{transform:translate(-5px,-5px);}
80%{transform:translate(5px,5px);}
}

#wishBox{
display:none;
margin-top:15px;
color:#ffb3ec;
font-size:18px;
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
<h1>Welcome ❤️</h1>
<button class="btn" onclick="enter()">Enter ✨</button>
</div>

<audio id="bgMusic" loop src="song.mp3"></audio>
<audio id="birthdayMusic" src="birthday.mp3"></audio>

<section>
<h1>🎂 Birthday Moment</h1>

<div class="cake">🎂</div>

<p>Make a wish… this moment is yours ❤️</p>

<button class="cake-btn" onclick="wish()">Make a Wish ✨</button>

<div id="wishBox">✨ Make a wish Vidhuuu 🫶🏻✨</div>
</section>

<script>

/* ENTER */
let musicStarted=false;
function enter(){
document.getElementById("entry").style.display="none";
if(!musicStarted){
document.getElementById("bgMusic").play().catch(()=>{});
musicStarted=true;
}
}

/* CONFETTI */
function confettiBurst(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#ff1493","#9333ea","#ffd700","#00ffff"][Math.floor(Math.random()*4)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}
}

/* FIREWORK */
function fireworks(){
for(let i=0;i<25;i++){
let f=document.createElement("div");
f.className="firework";
f.innerHTML=["🎆","✨","💥","🎇"][Math.floor(Math.random()*4)];
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1500);
}
}

/* SHAKE */
function screenShake(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),500);
}

/* WISH MOMENT */
function wish(){

document.getElementById("wishBox").style.display="block";

/* music */
let b=document.getElementById("birthdayMusic");
b.currentTime=0;
b.play();

/* cinematic effects */
confettiBurst();
fireworks();
screenShake();

/* whatsapp */
setTimeout(()=>{
window.open(
"https://wa.me/919399348807?text=Make%20a%20wish%20Vidhuuu%20🫶🏻✨",
"_blank"
);
},1200);

}

</script>

</body>
</html>

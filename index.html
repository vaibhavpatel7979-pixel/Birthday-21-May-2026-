<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Vidhii ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#3b0764,#000);
z-index:-2;
}

.stars{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:80px 20px;
position:relative;
}

.scroll-text{
position:absolute;
bottom:40px;
font-size:20px;
color:#fff;
animation:bounce 2s infinite;
text-shadow:0 0 20px #ff4fd8;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(10px);}
}

.hero h1{
font-size:90px;
font-weight:800;
line-height:1.1;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

.hero p{
margin-top:30px;
font-size:28px;
color:#fff;
line-height:1.8;
max-width:900px;
text-shadow:0 0 20px rgba(255,255,255,.5);
}

.tap-btn{
margin-top:50px;
padding:18px 45px;
border:none;
border-radius:50px;
background:linear-gradient(to right,#ff1493,#9333ea);
color:white;
font-size:22px;
font-weight:700;
cursor:pointer;
box-shadow:0 0 40px rgba(255,20,147,.5);
transition:.4s;
}

.tap-btn:hover{
transform:scale(1.08);
box-shadow:0 0 70px rgba(255,20,147,.9);
}

.title{
font-size:65px;
font-weight:800;
margin-bottom:30px;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

.subtitle{
font-size:26px;
line-height:1.9;
color:#fff;
max-width:900px;
text-shadow:0 0 20px rgba(255,255,255,.4);
}

.quote-box{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:35px;
border-radius:30px;
margin:25px 0;
max-width:900px;
width:100%;
transition:.4s;
animation:softGlow 4s infinite alternate;
}

.quote-box:hover{
transform:translateY(-10px);
}

@keyframes softGlow{

from{
box-shadow:
0 0 20px rgba(255,20,147,.15);
}

to{
box-shadow:
0 0 60px rgba(255,20,147,.45);
}

}

.quote-box h2{
font-size:34px;
color:#ffb3ec;
margin-bottom:15px;
text-shadow:0 0 20px #ff4fd8;
}

.quote-box p{
font-size:23px;
line-height:1.8;
color:#fff;
text-shadow:0 0 10px rgba(255,255,255,.3);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:35px;
width:100%;
max-width:1300px;
margin-top:50px;
}

.photo-frame{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:35px;
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 0 40px rgba(255,20,147,.15);
transition:.5s;
overflow:hidden;
}

.photo-frame:hover{
transform:scale(1.05) translateY(-10px);
box-shadow:0 0 70px rgba(255,20,147,.5);
}

.photo-frame img{
width:100%;
height:420px;
object-fit:cover;
border-radius:25px;
transition:1s;
}

.photo-frame:hover img{
transform:scale(1.08);
}

.cake{
font-size:170px;
animation:pulse 2s infinite;
}

.wish-message{
margin-top:30px;
font-size:30px;
color:#ffb3ec;
display:none;
animation:fadeIn 1s ease;
text-shadow:0 0 25px #ff4fd8;
}

.voice-box{
margin-top:40px;
background:rgba(255,255,255,.08);
padding:35px;
border-radius:35px;
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
animation:softGlow 4s infinite alternate;
}

.play-btn{
width:120px;
height:120px;
border:none;
border-radius:50%;
font-size:50px;
background:linear-gradient(to right,#ff1493,#9333ea);
color:white;
cursor:pointer;
box-shadow:0 0 50px rgba(255,20,147,.5);
transition:.4s;
}

.play-btn:hover{
transform:scale(1.1);
}

@keyframes glow{
from{
text-shadow:0 0 20px rgba(255,255,255,.2);
}

to{
text-shadow:
0 0 30px #ff4fd8,
0 0 60px #ff4fd8;
}
}

@keyframes pulse{
0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(.8);
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

@media(max-width:768px){

.hero h1,
.title{
font-size:52px;
}

.hero p,
.subtitle,
.quote-box p{
font-size:20px;
}

.quote-box h2{
font-size:28px;
}

.photo-frame img{
height:350px;
}

}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<audio id="birthdayMusic">
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="voiceNote">
<source src="voice.mp3" type="audio/mpeg">
</audio>

<div class="stars" id="stars"></div>

<section class="hero">

<h1>
Happy Birthday<br>
Vidhii ❤️
</h1>

<p>
From one random moment...
to becoming my favorite person forever ✨
</p>

<button class="tap-btn" onclick="startWebsite()">
Tap To Begin ✨
</button>

<div class="scroll-text">
↓ Scroll Slowly For A Surprise ❤️
</div>

</section>

<!-- KEEP REST OF YOUR SECTIONS SAME -->

<script>

const stars=document.getElementById('stars');

for(let i=0;i<250;i++){

const star=document.createElement('div');

star.classList.add('star');

star.style.left=Math.random()*100+'%';

star.style.top=Math.random()*100+'%';

star.style.animationDuration=(Math.random()*3+2)+'s';

stars.appendChild(star);

}

function startWebsite(){

const bgMusic=document.getElementById('bgMusic');

const birthdayMusic=document.getElementById('birthdayMusic');

const voiceNote=document.getElementById('voiceNote');

birthdayMusic.pause();
birthdayMusic.currentTime=0;

voiceNote.pause();
voiceNote.currentTime=0;

bgMusic.play();

window.scrollTo({
top:window.innerHeight,
behavior:'smooth'
});

}

function blowCandles(){

document.getElementById('wishMessage').style.display='block';

const bgMusic=document.getElementById('bgMusic');

const birthdayMusic=document.getElementById('birthdayMusic');

const voiceNote=document.getElementById('voiceNote');

bgMusic.pause();
bgMusic.currentTime=0;

voiceNote.pause();
voiceNote.currentTime=0;

birthdayMusic.play();

createHearts();

setTimeout(()=>{

window.open(
'https://wa.me/919399348807?text=I%20wanna%20give%20the%20biggest%20birthday%20hug%20to%20Vidhuuu%20❤️✨'
);

},2500);

}

function createHearts(){

for(let i=0;i<70;i++){

const heart=document.createElement('div');

heart.innerHTML=['❤️','✨','🎆','💖','🎇'][Math.floor(Math.random()*5)];

heart.style.position='fixed';

heart.style.left=Math.random()*100+'vw';

heart.style.top='100vh';

heart.style.fontSize=(Math.random()*25+20)+'px';

heart.style.zIndex='9999';

heart.style.animation='floatUp 4s linear forwards';

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

}

function playVoice(){

const bgMusic=document.getElementById('bgMusic');

const birthdayMusic=document.getElementById('birthdayMusic');

const voiceNote=document.getElementById('voiceNote');

bgMusic.pause();
bgMusic.currentTime=0;

birthdayMusic.pause();
birthdayMusic.currentTime=0;

voiceNote.play();

}

</script>

</body>
</html>

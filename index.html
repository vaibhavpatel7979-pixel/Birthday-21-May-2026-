<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Movie V8.1 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins,sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,#ff4ecd55,transparent 40%),
radial-gradient(circle at 80% 30%,#7c3aed55,transparent 40%),
radial-gradient(circle at 50% 80%,#00ffff22,transparent 50%),
linear-gradient(to bottom,#000,#0a0015,#000);
z-index:-3;
}

/* ENTRY */
#entry{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
text-align:center;
}

#introText{
font-size:40px;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:20px;
padding:14px 40px;
border:none;
border-radius:40px;
background:#ff1493;
color:white;
font-size:18px;
cursor:pointer;
}

/* 👇 IMPORTANT: scroll line only for AFTER entry */
#scrollHint{
position:fixed;
top:85%;
left:50%;
transform:translateX(-50%);
opacity:0;
color:#ffb3ec;
font-size:16px;
transition:1s;
animation:blink 1.2s infinite;
}

@keyframes blink{
50%{opacity:0.3;}
}

/* SECTIONS */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:70px 20px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

section.show{
opacity:1;
transform:translateY(0);
}

h1{
font-size:58px;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:20px;
color:#ddd;
max-width:900px;
line-height:1.9;
}

/* CAKE */
.cake{
font-size:180px;
}

/* BUTTON */
.cake-btn{
padding:14px 40px;
border:none;
border-radius:30px;
background:#9333ea;
color:white;
cursor:pointer;
margin-top:15px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
<h1>This is for you 🫶🏻💟</h1>
<button class="btn" onclick="enter()">Enter ✨</button>
</div>

<!-- 👇 scroll hint OUTSIDE entry -->
<div id="scrollHint">⬇ Scroll to see your surprise ✨</div>

<!-- AUDIO -->
<audio id="bgMusic" loop src="song.mp3"></audio>

<!-- HERO -->
<section>
<h1>Happy Birthday ❤️</h1>
<p>This is your cinematic surprise ✨</p>
</section>

<!-- CAKE -->
<section>
<h1>🎂 Cake Moment</h1>
<div class="cake">🎂</div>
<button class="cake-btn">Make Wish ✨</button>
</section>

<script>

/* ENTER FIX */
function enter(){
document.getElementById("entry").style.display="none";

/* show scroll AFTER enter */
setTimeout(()=>{
document.getElementById("scrollHint").style.opacity="1";
},800);

/* music start */
document.getElementById("bgMusic").play().catch(()=>{});
}

/* SCROLL ANIMATION */
window.addEventListener("scroll",()=>{
document.querySelectorAll("section").forEach(sec=>{
if(sec.getBoundingClientRect().top<600){
sec.classList.add("show");
}
});
});

</script>

</body>
</html>

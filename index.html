<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vidhii ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Poppins,sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* 🌌 background */
.stars{position:fixed;width:100%;height:100%;z-index:-2;}
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 3s infinite alternate;}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* 🔒 LOCK */
#lock{
position:fixed;inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#2a0040,#000);
z-index:9999;
}

#lock h1{
font-size:40px;
background:linear-gradient(to right,#ffb3ec,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:25px;
padding:15px 40px;
border:none;
border-radius:40px;
font-size:18px;
background:linear-gradient(to right,#ff1493,#9333ea);
color:white;
cursor:pointer;
}

/* sections */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:60px 20px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

section.show{opacity:1;transform:translateY(0);}

h1{
font-size:70px;
background:linear-gradient(to right,#ffb3ec,#fff,#d8b4fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{font-size:20px;color:#ddd;max-width:800px;margin-top:15px;}

/* 💌 letter */
#letter{
margin-top:25px;
font-size:22px;
max-width:800px;
line-height:1.8;
color:#ffb3ec;
white-space:pre-line;
}

/* 🖼 slider */
.slider{
margin-top:30px;
width:300px;
height:400px;
overflow:hidden;
border-radius:25px;
box-shadow:0 0 40px rgba(255,20,147,.4);
}
.slider img{
width:100%;
height:100%;
object-fit:cover;
}

/* 🎂 wish */
.cake{font-size:140px;animation:pulse 2s infinite;}
@keyframes pulse{50%{transform:scale(1.08)}}
</style>
</head>

<body>

<div id="lock">
<h1>💖 A Surprise Awaits Vidhii</h1>
<button class="btn" onclick="unlock()">Enter ✨</button>
</div>

<div class="stars" id="stars"></div>
<canvas id="fx"></canvas>

<audio id="bg" loop src="song.mp3"></audio>
<audio id="bd" src="birthday.mp3"></audio>

<!-- HERO -->
<section>
<h1>Happy Birthday<br>Vidhii ❤️</h1>
<p>You are not just a name… you are a feeling ✨</p>
<button class="btn" onclick="start()">Start Journey ✨</button>
</section>

<!-- LETTER -->
<section>
<h1>💌 Message</h1>
<div id="letter"></div>
</section>

<!-- SLIDER -->
<section>
<h1>📸 Memories</h1>
<div class="slider">
<img id="img" src="photo1.jpg">
</div>
</section>

<!-- WISH -->
<section>
<h1>🎂 Make Wish</h1>
<div class="cake">🎂</div>
<p>Close eyes & wish something beautiful ❤️</p>
<button class="btn" onclick="wish()">Blow Candles ✨</button>
</section>

<script>

/* ⭐ stars */
const stars=document.getElementById("stars");
for(let i=0;i<150;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
stars.appendChild(s);
}

/* 🔊 AUDIO CONTROL (NO OVERLAP FIX) */
function stopAll(){
document.getElementById("bg").pause();
document.getElementById("bd").pause();
document.getElementById("bg").currentTime=0;
document.getElementById("bd").currentTime=0;
}

/* unlock */
function unlock(){
document.getElementById("lock").style.display="none";
document.getElementById("bg").play();
}

/* scroll reveal */
const sec=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sec.forEach(s=>{
if(s.getBoundingClientRect().top<500) s.classList.add("show");
});
});

/* start */
function start(){
document.getElementById("bg").play();
sec[1].scrollIntoView({behavior:"smooth"});
typeText();
}

/* 💌 MULTI LINE TYPE */
const msgs=[
"I never knew someone could feel like home… until I met you ❤️",
"Your smile fixes everything I don’t talk about ✨",
"You are my calm in every chaos 🌙",
"And I just want you to be happy… always ❤️"
];

let idx=0,ch=0;
function typeText(){
let el=document.getElementById("letter");
el.innerHTML="";

let txt=msgs[idx];

let t=setInterval(()=>{
el.innerHTML+=txt[ch];
ch++;
if(ch>=txt.length){
clearInterval(t);
setTimeout(()=>{
idx=(idx+1)%msgs.length;
ch=0;
typeText();
},1500);
}
},40);
}

/* 🖼 slider */
let images=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
let i=0;
setInterval(()=>{
document.getElementById("img").src=images[i];
i=(i+1)%images.length;
},2500);

/* 🎆 FX */
const c=document.getElementById("fx");
const x=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let p=[];

/* fireworks */
function burst(){
for(let i=0;i<80;i++){
p.push({
x:c.width/2,
y:c.height/2,
vx:(Math.random()-0.5)*12,
vy:(Math.random()-0.5)*12,
a:1
});
}
}

/* animate */
function animate(){
x.clearRect(0,0,c.width,c.height);
p.forEach((e,i)=>{
e.x+=e.vx;
e.y+=e.vy;
e.a-=0.015;

x.fillStyle=`rgba(255,20,147,${e.a})`;
x.fillRect(e.x,e.y,3,3);

if(e.a<=0) p.splice(i,1);
});
requestAnimationFrame(animate);
}
animate();

/* 🎂 WISH */
function wish(){
stopAll();
document.getElementById("bd").play();

burst();
heartRain();
window.open("https://wa.me/919399348807?text=I made a wish for you ❤️✨");
}

/* ❤️ heart rain */
function heartRain(){
for(let i=0;i<60;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
h.style.fontSize="20px";
h.style.animation="float 4s linear";
document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);
}
}

</script>

<style>
@keyframes float{
to{transform:translateY(-120vh);opacity:0;}
}
</style>

</body>
</html>
